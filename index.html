<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #333;
            color: white;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <header>
        <h1>🚀 Mi Página en GitHub</h1>
        <p>Hola, esta es mi primera web publicada con GitHub Pages</p>
        <a href="#" class="btn">Ver más</a>
    </header>

    <footer>
        <p>Hecho por Nicolas 👨‍💻</p>
    </footer>

</body>
</html>
